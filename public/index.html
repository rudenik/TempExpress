<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Climate Dashboard</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Climate Dashboard</h1>
            <button class="refresh-btn" onclick="fetchLiveTemperatures()" id="refreshBtn">
                ⟳ Refresh
            </button>
        </header>

        <div class="grid">
            <div class="card active" id="card-living-room" onclick="selectRoom('living-room', 'Living Room')">
                <div class="card-header"><span>Living Room</span><span>🛋️</span></div>
                <div class="temperature"><span id="temp-living-room">--</span><span class="unit">°C</span></div>
                <div class="last-updated" id="time-living-room">Waiting for data...</div>
            </div>

            <div class="card" id="card-study" onclick="selectRoom('study', 'Study')">
                <div class="card-header"><span>Study</span><span>📚</span></div>
                <div class="temperature"><span id="temp-study">--</span><span class="unit">°C</span></div>
                <div class="last-updated" id="time-study">Waiting for data...</div>
            </div>

            <div class="card" id="card-den" onclick="selectRoom('den', 'Den')">
                <div class="card-header"><span>Den</span><span>📺</span></div>
                <div class="temperature"><span id="temp-den">--</span><span class="unit">°C</span></div>
                <div class="last-updated" id="time-den">Waiting for data...</div>
            </div>

            <div class="card" id="card-drafty-window" onclick="selectRoom('drafty-window', 'Drafty Window')">
                <div class="card-header"><span>Drafty Window</span><span>❄️</span></div>
                <div class="temperature"><span id="temp-drafty-window">--</span><span class="unit">°C</span></div>
                <div class="last-updated" id="time-drafty-window">Waiting for data...</div>
            </div>

            <div class="card" id="card-loft" onclick="selectRoom('loft', 'Loft')">
                <div class="card-header"><span>Loft</span><span>🪜</span></div>
                <div class="temperature"><span id="temp-loft">--</span><span class="unit">°C</span></div>
                <div class="last-updated" id="time-loft">Waiting for data...</div>
            </div>
        </div>

        <div class="chart-container">
            <div class="chart-header">
                <h2 class="chart-title"><span id="chart-room-name">Living Room</span> History</h2>
                <div class="time-controls">
                    <button class="time-btn" onclick="setTimeframe(1)" id="btn-1h">1 Hour</button>
                    <button class="time-btn" onclick="setTimeframe(6)" id="btn-6h">6 Hours</button>
                    <button class="time-btn active" onclick="setTimeframe(24)" id="btn-24h">24 Hours</button>
                    <button class="time-btn" onclick="setTimeframe(120)" id="btn-120h">5 Days</button>
                </div>
            </div>
            <canvas id="tempChart" height="100"></canvas>
        </div>
    </div>
    <script src="/js/main.js"></script>
</body>
</html>
